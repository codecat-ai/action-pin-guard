name: Feature request
description: Suggest a focused improvement.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What maintainer workflow would this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the behavior and any CLI or JSON changes.
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Risks and alternatives
      description: Note compatibility, security, or scope concerns.
